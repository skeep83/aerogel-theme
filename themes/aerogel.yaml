Aerogel Pearl: &aerogel_pearl
  card-mod-theme: Aerogel Altal Neumorphism
  card-mod-root-yaml: &aerogel_root |
    .: |
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&family=Rubik:wght@300;400;500;600;700&display=swap');
      :host { --aerogel-font: 'Nunito', 'Rubik', 'Segoe UI', Roboto, sans-serif; }
      html, body, home-assistant, home-assistant-main, app-drawer-layout, partial-panel-resolver,
      ha-panel-lovelace, ha-app-layout, hui-root, hui-view, hui-panel-view {
        background: var(--aerogel-base) !important;
        color: var(--aerogel-text) !important;
        font-family: var(--aerogel-font) !important;
      }
      body::before { content: none !important; }
      ha-sidebar, app-header, app-toolbar, .toolbar {
        background: var(--aerogel-base) !important;
        color: var(--aerogel-text) !important;
        border: 0 !important;
        box-shadow: var(--aerogel-convex-sm) !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }
      ha-sidebar .menu a, ha-sidebar .menu ha-icon-button, paper-icon-item, paper-item, paper-tab {
        border-radius: 16px !important;
        color: var(--aerogel-text) !important;
      }
      ha-sidebar .menu a:hover, paper-icon-item:hover, paper-item:hover, paper-tab:hover {
        background: var(--aerogel-base) !important;
        box-shadow: var(--aerogel-convex-sm) !important;
      }
      ha-sidebar .menu a[data-selected], paper-icon-item[aria-selected="true"], paper-item[aria-selected="true"], paper-tab[aria-selected="true"] {
        background: var(--aerogel-base) !important;
        color: var(--aerogel-accent) !important;
        box-shadow: var(--aerogel-active) !important;
      }
      ha-tabs { --paper-tabs-selection-bar-color: var(--aerogel-accent) !important; }
      .mdc-dialog__scrim {
        background: var(--aerogel-dialog-scrim, rgba(30,35,45,0.55)) !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }
      *:focus-visible { outline: 2px solid var(--aerogel-accent) !important; outline-offset: 2px !important; border-radius: 14px !important; }
  card-mod-card-yaml: &aerogel_card |
    .: |
      ha-card, mushroom-card, hui-card, hui-tile-card {
        background: var(--aerogel-base) !important;
        color: var(--aerogel-text) !important;
        border: 0 !important;
        border-radius: var(--aerogel-radius-card, 24px) !important;
        box-shadow: var(--aerogel-convex-lg) !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        font-family: var(--aerogel-font) !important;
        overflow: hidden;
      }
      ha-card:hover, mushroom-card:hover, hui-card:hover, hui-tile-card:hover { box-shadow: var(--aerogel-convex-lg) !important; }
      ha-card:active, mushroom-card:active, hui-card:active, hui-tile-card:active { box-shadow: var(--aerogel-active) !important; transform: translateY(1px) !important; }
      .secondary, .secondary-text, .state, .subtext, .attribute, .metadata { color: var(--aerogel-text-secondary) !important; }
      button, ha-icon-button, mwc-button, ha-chip, mushroom-chip, .chip, .badge {
        background: var(--aerogel-base) !important;
        color: var(--aerogel-text) !important;
        border: 0 !important;
        border-radius: var(--aerogel-radius-button, 16px) !important;
        box-shadow: var(--aerogel-flat) !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }
      button:active, ha-icon-button:active, mwc-button:active, ha-chip:active, mushroom-chip:active, .chip:active, .badge:active { box-shadow: var(--aerogel-active) !important; }
      ha-slider, ha-bar-slider { --slider-color: var(--aerogel-accent) !important; --slider-secondary-color: var(--aerogel-base-alt) !important; }
      ha-switch { --switch-checked-track-color: var(--aerogel-accent) !important; --switch-checked-button-color: var(--aerogel-accent) !important; }
      ha-state-label-badge { background: var(--aerogel-base) !important; color: var(--aerogel-text) !important; border: 0 !important; box-shadow: var(--aerogel-convex-sm) !important; }
      ha-map, ha-chart-base, ha-graph, statistics-chart { background: var(--aerogel-base) !important; border-radius: 24px !important; box-shadow: var(--aerogel-concave-lg) !important; }
  card-mod-more-info-yaml: &aerogel_more_info |
    .: |
      ha-dialog, ha-more-info-dialog, ha-dialog > div, .mdc-dialog__surface {
        background: var(--aerogel-base) !important;
        color: var(--aerogel-text) !important;
        border-radius: var(--aerogel-radius-dialog, 28px) !important;
        border: 0 !important;
        box-shadow: var(--aerogel-convex-lg) !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        font-family: var(--aerogel-font) !important;
      }
      .mdc-dialog__surface ha-card, ha-more-info-dialog ha-card { background: var(--aerogel-base) !important; border: 0 !important; box-shadow: var(--aerogel-convex-sm) !important; }
  card-mod-view-yaml: &aerogel_view |
    .: |
      hui-view, hui-panel-view, .view, #view { background: var(--aerogel-base) !important; background-image: none !important; }
  primary-font-family: var(--aerogel-font)
  paper-font-common-base_-_font-family: var(--aerogel-font)
  paper-font-body1_-_font-family: var(--aerogel-font)
  paper-font-headline_-_font-family: var(--aerogel-font)
