Aerogel Pearl: &aerogel_pearl
  card-mod-theme: Aerogel NeoSurface Pro
  card-mod-root-yaml: &aerogel_root |
    .: |
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
      :host {
        --aerogel-font: 'Inter', 'SF Pro Display', 'Segoe UI Variable', system-ui, sans-serif;
      }
      html, body {
        font-family: var(--aerogel-font) !important;
        background: var(--primary-background-color) !important;
        color: var(--primary-text-color) !important;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: var(--aerogel-ambient-overlay, transparent);
        opacity: 1;
        z-index: 0;
      }
      home-assistant,
      home-assistant-main,
      app-drawer-layout,
      partial-panel-resolver,
      ha-panel-lovelace,
      ha-app-layout,
      hui-root,
      hui-view,
      hui-panel-view {
        background: transparent !important;
        font-family: var(--aerogel-font) !important;
      }
      ha-sidebar {
        background: var(--aerogel-sidebar-bg, rgba(248,250,252,0.92)) !important;
        border-right: 1px solid var(--aerogel-border, rgba(15,23,42,0.08)) !important;
        backdrop-filter: blur(18px) !important;
        -webkit-backdrop-filter: blur(18px) !important;
        box-shadow: inset -1px 0 0 rgba(255,255,255,0.35) !important;
      }
      ha-sidebar .menu .title,
      ha-sidebar .menu .subtitle,
      paper-item,
      mwc-list-item {
        font-family: var(--aerogel-font) !important;
      }
      ha-sidebar .menu a,
      ha-sidebar .menu ha-icon-button {
        border-radius: var(--aerogel-radius-button, 18px) !important;
        transition: transform var(--aerogel-transition-fast, 160ms ease),
                    background var(--aerogel-transition-fast, 160ms ease),
                    box-shadow var(--aerogel-transition-fast, 160ms ease) !important;
      }
      ha-sidebar .menu a:hover {
        background: var(--aerogel-surface-raised, #FFFFFF) !important;
        box-shadow: var(--aerogel-shadow-soft, 6px 6px 16px rgba(148,163,184,0.28), -5px -5px 14px rgba(255,255,255,0.95)) !important;
      }
      ha-sidebar .menu a[data-selected] {
        background: var(--aerogel-surface-raised, #FFFFFF) !important;
        color: var(--aerogel-accent, #38BDF8) !important;
        box-shadow: var(--aerogel-shadow-pressed, inset 6px 6px 14px rgba(148,163,184,0.28), inset -5px -5px 12px rgba(255,255,255,0.95)) !important;
      }
      .toolbar,
      app-header,
      app-toolbar {
        background: var(--aerogel-header-bg, rgba(238,242,247,0.88)) !important;
        border-bottom: 1px solid var(--aerogel-border, rgba(15,23,42,0.08)) !important;
        backdrop-filter: blur(16px) !important;
        -webkit-backdrop-filter: blur(16px) !important;
        box-shadow: 0 10px 24px rgba(15,23,42,0.08) !important;
      }
      ha-tabs {
        --paper-tabs-selection-bar-color: var(--aerogel-primary, #2563EB) !important;
      }
      paper-tab {
        border-radius: var(--aerogel-radius-button, 18px) !important;
      }
      paper-tab:hover {
        background: rgba(var(--aerogel-primary-rgb, 37,99,235), 0.08) !important;
      }
      paper-tab[aria-selected="true"] {
        background: var(--aerogel-surface-raised, #FFFFFF) !important;
        box-shadow: var(--aerogel-shadow-soft, 6px 6px 16px rgba(148,163,184,0.28), -5px -5px 14px rgba(255,255,255,0.95)) !important;
      }
      .mdc-dialog__scrim {
        background: rgba(3,7,18,0.58) !important;
        backdrop-filter: blur(8px) !important;
        -webkit-backdrop-filter: blur(8px) !important;
      }
      *:focus-visible {
        outline: 2px solid var(--aerogel-accent, #38BDF8) !important;
        outline-offset: 2px !important;
        border-radius: var(--aerogel-radius-button, 18px) !important;
      }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
  card-mod-card-yaml: &aerogel_card |
    .: |
      ha-card,
      mushroom-card,
      hui-card,
      hui-tile-card {
        background: var(--aerogel-surface, #F8FAFC) !important;
        color: var(--aerogel-text-primary, #0F172A) !important;
        border: 1px solid var(--aerogel-border, rgba(15,23,42,0.08)) !important;
        border-radius: var(--aerogel-radius-card, 28px) !important;
        box-shadow: var(--aerogel-shadow-raised, 10px 10px 24px rgba(148,163,184,0.28), -8px -8px 20px rgba(255,255,255,0.95)) !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        font-family: var(--aerogel-font) !important;
        transition: transform var(--aerogel-transition-normal, 240ms ease),
                    box-shadow var(--aerogel-transition-normal, 240ms ease),
                    border-color var(--aerogel-transition-fast, 160ms ease) !important;
      }
      ha-card:hover,
      mushroom-card:hover,
      hui-card:hover,
      hui-tile-card:hover {
        transform: translateY(-2px) !important;
        box-shadow: var(--aerogel-shadow-hover, 14px 14px 32px rgba(148,163,184,0.32), -10px -10px 24px rgba(255,255,255,0.98)) !important;
      }
      ha-card:active,
      mushroom-card:active,
      hui-card:active,
      hui-tile-card:active {
        transform: translateY(1px) !important;
        box-shadow: var(--aerogel-shadow-pressed, inset 6px 6px 14px rgba(148,163,184,0.28), inset -5px -5px 12px rgba(255,255,255,0.95)) !important;
      }
      ha-switch {
        --switch-checked-track-color: rgba(var(--aerogel-accent-rgb, 56,189,248), 0.28) !important;
        --switch-checked-button-color: var(--aerogel-accent, #38BDF8) !important;
      }
      ha-slider,
      ha-bar-slider {
        --slider-color: var(--aerogel-primary, #2563EB) !important;
        --slider-secondary-color: rgba(var(--aerogel-primary-rgb, 37,99,235), 0.2) !important;
      }
      .weather-card,
      ha-card.weather-card {
        background: radial-gradient(circle at 20% 10%, rgba(var(--aerogel-primary-rgb, 37,99,235), 0.14), transparent 34%), var(--aerogel-surface, #F8FAFC) !important;
        box-shadow: var(--aerogel-shadow-raised, 10px 10px 24px rgba(148,163,184,0.28), -8px -8px 20px rgba(255,255,255,0.95)) !important;
      }
      ha-state-label-badge,
      ha-chip,
      .chip {
        background: var(--aerogel-badge-bg, rgba(248,250,252,0.86)) !important;
        border: 1px solid var(--aerogel-border, rgba(15,23,42,0.08)) !important;
        border-radius: 999px !important;
        box-shadow: var(--aerogel-shadow-soft, 6px 6px 16px rgba(148,163,184,0.28), -5px -5px 14px rgba(255,255,255,0.95)) !important;
        backdrop-filter: blur(12px) !important;
        -webkit-backdrop-filter: blur(12px) !important;
      }
  card-mod-more-info-yaml: &aerogel_more_info |
    .: |
      ha-dialog,
      ha-more-info-dialog,
      ha-dialog > div,
      .mdc-dialog__surface {
        background: var(--aerogel-surface-raised, #FFFFFF) !important;
        color: var(--aerogel-text-primary, #0F172A) !important;
        border-radius: var(--aerogel-radius-dialog, 30px) !important;
        border: 1px solid var(--aerogel-border, rgba(15,23,42,0.08)) !important;
        box-shadow: 0 32px 90px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.06) !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }
  card-mod-view-yaml: &aerogel_view |
    .: |
      hui-view,
      hui-panel-view,
      .view {
        background: var(--aerogel-view-background, var(--primary-background-color)) !important;
        background-attachment: fixed !important;
      }
      #view {
        position: relative;
      }
