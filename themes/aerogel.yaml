Aerogel Pro Graphite: &aerogel_pro_graphite
  card-mod-theme: Aerogel Pro
  card-mod-root-yaml: &aerogel_card_mod_root |
    .: |
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
      :host {
        --aerogel-font: 'Inter', 'SF Pro Display', 'Segoe UI Variable', system-ui, sans-serif;
      }
      html, body {
        font-family: var(--aerogel-font) !important;
        background: var(--primary-background-color) !important;
        color: var(--primary-text-color) !important;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: var(--aerogel-ambient-overlay, transparent);
        opacity: 1;
        z-index: 0;
      }
      home-assistant, home-assistant-main, app-drawer-layout, partial-panel-resolver, ha-panel-lovelace {
        background: transparent !important;
      }
      ha-app-layout, hui-root, hui-view, hui-panel-view {
        font-family: var(--aerogel-font) !important;
      }
      ha-sidebar {
        background: var(--sidebar-background-color, rgba(9, 14, 23, 0.78)) !important;
        border-right: 1px solid var(--aerogel-border-color, rgba(255,255,255,0.08)) !important;
        backdrop-filter: blur(24px) saturate(1.2) !important;
        -webkit-backdrop-filter: blur(24px) saturate(1.2) !important;
        box-shadow: inset -1px 0 0 rgba(255,255,255,0.03) !important;
      }
      ha-sidebar .menu .title,
      ha-sidebar .menu .subtitle,
      paper-item,
      mwc-list-item {
        font-family: var(--aerogel-font) !important;
      }
      ha-sidebar .menu a,
      ha-sidebar .menu ha-icon-button {
        border-radius: var(--aerogel-radius-md, 20px) !important;
        transition: transform var(--aerogel-transition-fast, 160ms ease),
                    background var(--aerogel-transition-fast, 160ms ease),
                    border-color var(--aerogel-transition-fast, 160ms ease) !important;
      }
      ha-sidebar .menu a:hover {
        background: var(--aerogel-sidebar-hover, rgba(255,255,255,0.05)) !important;
        transform: translateX(2px) !important;
      }
      ha-sidebar .menu a[data-selected] {
        background: var(--aerogel-sidebar-selected, rgba(59,130,246,0.14)) !important;
        border: 1px solid var(--aerogel-sidebar-selected-border, rgba(59,130,246,0.28)) !important;
        box-shadow: var(--aerogel-elevation-1, 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08)) !important;
      }
      ha-sidebar .menu a[data-selected] ha-icon {
        color: var(--aerogel-accent, #3B82F6) !important;
      }
      .toolbar, app-header {
        background: var(--app-header-background-color, rgba(9, 14, 23, 0.55)) !important;
        border-bottom: 1px solid var(--aerogel-border-color, rgba(255,255,255,0.08)) !important;
        backdrop-filter: blur(24px) saturate(1.2) !important;
        -webkit-backdrop-filter: blur(24px) saturate(1.2) !important;
        box-shadow: 0 10px 30px rgba(2, 8, 23, 0.12) !important;
      }
      ha-tabs {
        --paper-tabs-selection-bar-color: var(--aerogel-accent, #3B82F6) !important;
      }
      paper-tab {
        border-radius: var(--aerogel-radius-sm, 14px) !important;
        transition: transform var(--aerogel-transition-fast, 160ms ease),
                    background var(--aerogel-transition-fast, 160ms ease) !important;
      }
      paper-tab:hover {
        background: var(--aerogel-tab-hover, rgba(255,255,255,0.06)) !important;
      }
      paper-tab[aria-selected="true"] {
        background: var(--aerogel-tab-selected, rgba(59,130,246,0.12)) !important;
      }
      mwc-dialog .mdc-dialog__surface,
      ha-dialog {
        border-radius: var(--aerogel-radius-xl, 34px) !important;
      }
      *:focus-visible {
        outline: 2px solid var(--aerogel-accent, #3B82F6) !important;
        outline-offset: 2px !important;
        border-radius: var(--aerogel-radius-sm, 14px) !important;
      }
      ::-webkit-scrollbar {
        width: 8px !important;
        height: 8px !important;
      }
      ::-webkit-scrollbar-track {
        background: transparent !important;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--scrollbar-thumb-color, rgba(148,163,184,0.35)) !important;
        border-radius: 999px !important;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(var(--aerogel-accent-rgb, 59, 130, 246), 0.65) !important;
      }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
      @media print {
        body::before,
        ha-sidebar,
        app-header,
        .toolbar {
          display: none !important;
        }
        ha-card {
          box-shadow: none !important;
          border: 1px solid #CBD5E1 !important;
          background: #FFFFFF !important;
        }
      }
  card-mod-card-yaml: &aerogel_card_mod_card |
    .: |
      ha-card {
        background: var(--ha-card-background, var(--card-background-color, rgba(17,24,39,0.72))) !important;
        border: 1px solid var(--aerogel-border-color, rgba(255,255,255,0.08)) !important;
        border-radius: var(--ha-card-border-radius, var(--aerogel-radius-lg, 28px)) !important;
        box-shadow: var(--ha-card-box-shadow, var(--aerogel-elevation-glass, 0 20px 60px rgba(0,0,0,0.32))) !important;
        backdrop-filter: var(--aerogel-glass-blur, blur(24px)) var(--aerogel-glass-saturate, saturate(1.2)) !important;
        -webkit-backdrop-filter: var(--aerogel-glass-blur, blur(24px)) var(--aerogel-glass-saturate, saturate(1.2)) !important;
        font-family: var(--aerogel-font) !important;
        transition: transform var(--aerogel-transition-normal, 240ms ease),
                    box-shadow var(--aerogel-transition-normal, 240ms ease),
                    border-color var(--aerogel-transition-fast, 160ms ease),
                    background var(--aerogel-transition-fast, 160ms ease) !important;
      }
      ha-card:hover {
        transform: translateY(-2px) !important;
        box-shadow: var(--aerogel-elevation-3, 0 16px 48px rgba(0,0,0,0.26)) !important;
        border-color: var(--aerogel-border-color-strong, rgba(255,255,255,0.14)) !important;
      }
      ha-card:active {
        transform: scale(0.985) !important;
      }
      ha-switch {
        --switch-checked-track-color: rgba(var(--aerogel-accent-rgb, 59,130,246), 0.34) !important;
        --switch-checked-button-color: var(--aerogel-accent, #3B82F6) !important;
        --switch-unchecked-track-color: rgba(var(--rgb-primary-text-color, 248,250,252), 0.18) !important;
      }
      ha-slider, ha-bar-slider {
        --slider-color: var(--aerogel-accent, #3B82F6) !important;
        --slider-secondary-color: rgba(var(--aerogel-accent-rgb, 59,130,246), 0.18) !important;
      }
      state-badge[data-state="on"] ha-state-icon,
      state-badge[data-domain="light"][data-state="on"] ha-state-icon {
        color: var(--aerogel-state-on, #3B82F6) !important;
        filter: drop-shadow(0 0 12px rgba(var(--aerogel-accent-rgb, 59,130,246), 0.38)) !important;
      }
      state-badge[data-domain="climate"][data-state="heat"] ha-state-icon {
        color: var(--aerogel-state-heat, #F59E0B) !important;
      }
      state-badge[data-domain="climate"][data-state="cool"] ha-state-icon {
        color: var(--aerogel-state-cool, #06B6D4) !important;
      }
      state-badge[data-state="unavailable"] {
        opacity: 0.45 !important;
        filter: grayscale(1) !important;
      }
      ha-state-label-badge,
      ha-chip,
      .chip {
        background: rgba(var(--aerogel-accent-rgb, 59,130,246), 0.08) !important;
        border: 1px solid rgba(var(--aerogel-accent-rgb, 59,130,246), 0.14) !important;
        border-radius: var(--aerogel-radius-full, 999px) !important;
        box-shadow: var(--aerogel-elevation-1, 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08)) !important;
      }
      .aerogel-glass,
      ha-card.aerogel-glass {
        background: var(--aerogel-glass-bg, rgba(17,24,39,0.72)) !important;
        border: var(--aerogel-glass-border, 1px solid rgba(255,255,255,0.08)) !important;
        box-shadow: var(--aerogel-elevation-glass, 0 20px 60px rgba(0,0,0,0.32)) !important;
      }
      .aerogel-elevated,
      ha-card.aerogel-elevated {
        box-shadow: var(--aerogel-elevation-3, 0 16px 48px rgba(0,0,0,0.26)) !important;
      }
      .aerogel-skeleton {
        background: linear-gradient(90deg, rgba(var(--rgb-card-background-color, 17,24,39), 0.72) 15%, rgba(var(--aerogel-accent-rgb, 59,130,246), 0.14) 50%, rgba(var(--rgb-card-background-color, 17,24,39), 0.72) 85%) !important;
        background-size: 200% 100% !important;
        animation: aerogel-shimmer 1.6s linear infinite !important;
        border-radius: var(--aerogel-radius-md, 20px) !important;
      }
      .aerogel-state-warning {
        border-color: rgba(249,115,22,0.42) !important;
      }
      .aerogel-state-alert {
        border-color: rgba(239,68,68,0.42) !important;
        animation: aerogel-alert 3s ease-in-out infinite !important;
      }
      @keyframes aerogel-shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      @keyframes aerogel-alert {
        0%, 100% { filter: saturate(1); }
        50% { filter: saturate(1.18) brightness(1.03); }
      }
  card-mod-more-info-yaml: &aerogel_card_mod_more_info |
    .: |
      ha-dialog, mwc-dialog .mdc-dialog__surface {
        background: var(--card-background-color, rgba(17,24,39,0.82)) !important;
        border: 1px solid var(--aerogel-border-color, rgba(255,255,255,0.08)) !important;
        border-radius: var(--aerogel-radius-xl, 34px) !important;
        box-shadow: var(--aerogel-elevation-glass, 0 20px 60px rgba(0,0,0,0.32)) !important;
        backdrop-filter: blur(28px) saturate(1.2) !important;
        -webkit-backdrop-filter: blur(28px) saturate(1.2) !important;
      }
      .content, .container {
        font-family: var(--aerogel-font) !important;
      }
  card-mod-view-yaml: &aerogel_card_mod_view |
    .: |
      hui-view,
      hui-panel-view,
      .view {
        background: var(--aerogel-view-background, var(--primary-background-color)) !important;
        background-attachment: fixed !important;
      }
      #view {
        position: relative;
      }
